# =============================================
# Cartify Backend — Application Configuration
# =============================================

spring.application.name=cartify-backend
server.port=8080

# --- Database ---
spring.datasource.url=jdbc:postgresql://localhost:5432/cartify
spring.datasource.username=cartify_user
spring.datasource.password=cartify_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration-ms=86400000

# --- Swagger / OpenAPI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# --- CORS (dev) ---
app.cors.allowed-origins=http://localhost:3000
