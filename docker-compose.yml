version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cartify-postgres
    environment:
      POSTGRES_DB: cartify
      POSTGRES_USER: cartify_user
      POSTGRES_PASSWORD: cartify_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cartify_user -d cartify"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cartify-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cartify.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
